<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AJ Revetement — Assistant</title>
    <link rel="stylesheet" href="styles.css?v=aj-brand-3" />
    <style>
      :root {
        --color-primary: #8b1a1a;
        --color-primary-hover: #a01e1e;
        --color-logo-accent: #7a1515;
        --color-background: #f5f0eb;
        --color-surface: #ffffff;
        --color-text-primary: #1a1a1a;
        --color-text-on-red: #ffffff;
      }
      html {
        background-color: #f5f0eb;
      }
      body {
        background-color: #f5f0eb;
        color: #1a1a1a;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-left">
          <a href="/" class="back-btn" data-i18n="backToProjects">← Projets</a>
          <div class="brand">
            <span class="brand-mark">AJ</span>
            <div class="brand-text">
              <h1 data-i18n="appName">AJ Revetement</h1>
              <p data-i18n="tagline">Assistant technique</p>
            </div>
          </div>
        </div>
        <div class="header-right">
          <span class="status" id="status" aria-live="polite"></span>
        </div>
      </header>

      <main class="chat-panel">
        <div class="messages" id="messages" role="log" aria-relevant="additions">
        </div>

        <form class="composer" id="form" autocomplete="off">
          <label class="sr-only" for="input" data-i18n="inputPlaceholder">Posez une question…</label>
          <textarea
            id="input"
            rows="1"
            data-i18n-placeholder="inputPlaceholder"
            placeholder="Posez une question…"
            required
          ></textarea>
          <button type="button" id="tech-sheet-btn" class="btn-secondary" data-i18n="techSheet">
            Fiche technique
          </button>
          <button type="button" id="mic-btn" aria-label="Dicter un message">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <button type="submit" id="send" data-i18n="send">Envoyer</button>
        </form>
      </main>
    </div>

    <!-- Settings overlay -->
    <div class="settings-overlay" id="settings-overlay" hidden>
      <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <h3 id="settings-title" data-i18n="settingsTitle">Paramètres</h3>

        <div class="settings-field">
          <label for="settings-lang" data-i18n="language">Langue</label>
          <select id="settings-lang">
            <option value="fr" data-i18n-opt="french">Français</option>
            <option value="en" data-i18n-opt="english">English</option>
          </select>
        </div>

        <div class="settings-field">
          <label for="settings-username" data-i18n="username">Votre nom</label>
          <input
            id="settings-username"
            type="text"
            data-i18n-placeholder="usernamePlaceholder"
            placeholder="ex. Jean Tremblay"
          />
        </div>

        <div class="settings-actions">
          <button id="settings-close" class="btn-secondary" data-i18n="close">Fermer</button>
          <button id="settings-save" class="btn-primary" data-i18n="save">Enregistrer</button>
        </div>
      </div>
    </div>

    <!-- Gear button fixed bottom-left -->
    <button class="gear-btn" id="gear-btn" aria-label="Paramètres">⚙</button>

    <script type="module" src="/app.js"></script>
  </body>
</html>
