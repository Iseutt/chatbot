<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>AJ Revetement</title>
    <link rel="stylesheet" href="styles.css?v=aj-brand-3" />
    <style>
      /* Brand tokens (repeated after link so they win over any stale cached CSS) */
      :root {
        --color-primary: #8b1a1a;
        --color-primary-hover: #a01e1e;
        --color-logo-accent: #7a1515;
        --color-background: #f5f0eb;
        --color-surface: #ffffff;
        --color-text-primary: #1a1a1a;
        --color-text-on-red: #ffffff;
      }
      html {
        background-color: #f5f0eb;
      }
      body {
        background-color: #f5f0eb;
        color: #1a1a1a;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page-wrap">
      <!-- Top bar -->
      <header class="lp-header">
        <div class="brand">
          <span class="brand-mark">AJ</span>
          <div class="brand-text">
            <h1 data-i18n="appName">AJ Revetement</h1>
            <p data-i18n="tagline">Assistant technique</p>
          </div>
        </div>
        <div class="lp-header-right">
          <select id="lang-select" class="lang-select" aria-label="Langue / Language">
            <option value="fr">Français</option>
            <option value="en">English</option>
          </select>
        </div>
      </header>

      <!-- Two-column body -->
      <div class="lp-body">
        <!-- Sidebar -->
        <aside class="sidebar">
          <button id="new-project-btn" class="btn-primary" data-i18n="newProject">
            + Nouveau projet
          </button>
          <h2 class="sidebar-title" data-i18n="projects">Projets</h2>
          <ul id="project-list" class="project-list"></ul>
        </aside>

        <!-- Main / empty state -->
        <main class="lp-main">
          <div class="lp-empty" id="lp-empty">
            <span class="brand-mark-lg">AJ</span>
            <p data-i18n="noProjects">Aucun projet pour l'instant.<br>Créez-en un pour commencer.</p>
          </div>
        </main>
      </div>
    </div>

    <!-- Settings overlay -->
    <div class="settings-overlay" id="settings-overlay" hidden>
      <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <h3 id="settings-title" data-i18n="settingsTitle">Paramètres</h3>

        <div class="settings-field">
          <label for="settings-lang" data-i18n="language">Langue</label>
          <select id="settings-lang">
            <option value="fr" data-i18n-opt="french">Français</option>
            <option value="en" data-i18n-opt="english">English</option>
          </select>
        </div>

        <div class="settings-field">
          <label for="settings-username" data-i18n="username">Votre nom</label>
          <input
            id="settings-username"
            type="text"
            data-i18n-placeholder="usernamePlaceholder"
            placeholder="ex. Jean Tremblay"
          />
        </div>

        <p class="settings-section-label" data-i18n="micSection">Microphone</p>

        <div class="settings-field">
          <label for="settings-mic-mode" data-i18n="micMode">Mode de saisie</label>
          <select id="settings-mic-mode">
            <option value="toggle" data-i18n-opt="micModeToggle">Cliquer (activer/désactiver)</option>
            <option value="hold" data-i18n-opt="micModeHold">Maintenir le bouton</option>
          </select>
        </div>

        <div class="settings-field settings-field--row">
          <label for="settings-mic-live" data-i18n="micLive">Transcription en direct</label>
          <input type="checkbox" id="settings-mic-live" />
        </div>

        <div class="settings-field settings-field--row">
          <label for="settings-mic-autosend" data-i18n="micAutoSend">Envoi automatique</label>
          <input type="checkbox" id="settings-mic-autosend" />
        </div>

        <div class="settings-actions">
          <button id="settings-close" class="btn-secondary" data-i18n="close">Fermer</button>
          <button id="settings-save" class="btn-primary" data-i18n="save">Enregistrer</button>
        </div>
      </div>
    </div>

    <!-- Gear button fixed bottom-left -->
    <button class="gear-btn" id="gear-btn" aria-label="Paramètres">⚙</button>

    <!-- Contact card fixed bottom-right -->
    <div class="contact-card">
      <h4 class="contact-title">Contactez-nous</h4>
      <address class="contact-info">
        <p>5180 Rue Gaudet<br>Drummondville, QC J2E 1L9</p>
        <p><a href="tel:+18193888668">(819) 388-8668</a></p>
        <p><a href="mailto:info@ajrevetement.ca">info@ajrevetement.ca</a></p>
        <p>RBQ : 5873-4427-01</p>
      </address>
      <div class="contact-socials">
        <a href="https://www.facebook.com/profile.php?id=61584791086062" target="_blank" rel="noopener noreferrer" aria-label="Facebook" class="social-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </a>
        <a href="https://www.instagram.com/ajrevetement/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" class="social-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>
        <a href="https://www.linkedin.com/company/aj-rev%C3%AAtement/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" class="social-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/>
            <circle cx="4" cy="4" r="2"/>
          </svg>
        </a>
      </div>
    </div>

    <script type="module" src="/landing.js"></script>
  </body>
</html>
